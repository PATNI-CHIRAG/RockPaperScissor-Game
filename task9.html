<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <link rel="stylesheet" href="task9.css" />
</head>

<body>
    <div class="title">
        <h2 class="gamename">Rock Paper Scissors</h2>
    </div>

    <div class="symbol">
        <img class="button" id="rock"
            src="https://media.licdn.com/dms/image/sync/v2/D5627AQFJXKy7w6dxiw/articleshare-shrink_800/articleshare-shrink_800/0/1721422742405?e=2147483647&v=beta&t=IU6iTJmn9hJ0nYmNg-RQ5Y2y41HW_O2GHHwYdSSLFLc"
            alt="Rock" />

        <img class="button" id="paper"
            src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTtP8oYZPag_tDy4L3rAitHCkCh-GW1_WVj8Q&s"
            alt="Paper" />

        <img class="button" id="scissor" src="https://i.pinimg.com/474x/67/eb/fd/67ebfd32e898b4ec3ae4e59ae33832c8.jpg"
            alt="Scissors"/>
    </div>

    <div class="win">
        <div class="name">
            <span id="you">0</span>
            <h3>You</h3>
        </div>
        <div class="name">
            <span id="comp">0</span>
            <h3>Comp</h3>
        </div>
    </div>

    <div class="message">
        <div>
            <p id="round">Round: 
                <span id="round-number">1</span>
            </p>
        </div>
        <div>
            <p id="text">Pick your move!</p>
        </div>
    </div>

</body>
<script src="task9.js"></script>

</html>
